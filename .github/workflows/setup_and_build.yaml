name: Build and Run Flask Server

on:
    workflow_dispatch:

jobs:
    build-and-run:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                python-version: ["3.9", "3.12"]

        steps:
            - name: Checkout repository code
              uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            # ─────────────── UBUNTU ───────────────
            - name: Start Flask Server (Ubuntu)
              if: runner.os == 'Linux'
              env:
                  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
                  PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
              run: |
                  python app.py &
                  sleep 5
                  curl --fail http://localhost:5000 && echo "Server is up!" || echo "Server health check failed"

            # ─────────────── WINDOWS ───────────────
            - name: Start Flask Server (Windows)
              if: runner.os == 'Windows'
              env:
                  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
                  PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
              run: |
                  Start-Process python -ArgumentList "app.py" -NoNewWindow
                  Start-Sleep -Seconds 5
                  try {
                      Invoke-WebRequest -Uri http://localhost:5000 -UseBasicParsing | Out-Null
                      Write-Host "Server is up!"
                  } catch {
                      Write-Host "Server health check failed"
                  }
              shell: pwsh
